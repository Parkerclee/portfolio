<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="85%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#E6B85A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FBF4E2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#6E7C3F" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FBF4E2" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#553824" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#FBF4E2"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Moon + sparkle cluster -->
  <g transform="translate(90 90)">
    <path d="M 0 24 A 24 24 0 1 0 24 0 A 18 18 0 0 1 0 24 Z" fill="#D9A441"/>
    <path d="M 60 10 L 64 20 L 74 24 L 64 28 L 60 38 L 56 28 L 46 24 L 56 20 Z" fill="#D9A441"/>
    <circle cx="82" cy="8" r="3" fill="#D9A441"/>
  </g>

  <!-- Logo badge -->
  <g transform="translate(90 500)">
    <rect width="64" height="64" rx="16" fill="#C4663D"/>
    <circle cx="52" cy="12" r="4" fill="#D9A441"/>
    <text x="32" y="45" text-anchor="middle" fill="#F3E4C6" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="30">PL</text>
  </g>
  <text x="170" y="545" fill="#553824" font-family="Georgia, serif" font-weight="600" font-size="28">Parker Lee</text>
  <text x="170" y="572" fill="#553824" fill-opacity="0.65" font-family="Georgia, serif" font-size="20">Instructional Designer</text>

  <!-- Headline -->
  <text x="90" y="260" fill="#553824" font-family="Georgia, serif" font-weight="600" font-size="84">Learning that</text>
  <text x="90" y="360" fill="#553824" font-family="Georgia, serif" font-weight="600" font-size="84">
    <tspan fill="#C4663D" font-style="italic">earns</tspan> its budget.
  </text>
  <text x="90" y="430" fill="#553824" fill-opacity="0.7" font-family="Georgia, serif" font-size="30">
    AI-assisted instructional design for compliance, clinical, and retail teams.
  </text>
</svg>
